<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FinIntern Hub - 我的收藏岗位列表">
    <meta name="keywords" content="金融实习, 收藏, 招聘">
    <meta name="author" content="FinIntern Hub">
    <meta name="theme-color" content="#3b82f6">
    <title>我的收藏 - FinIntern Hub</title>
    
    <!-- 公共资源 -->
    <link rel="stylesheet" href="./css/common.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
        .card-hover { transition: all 0.3s ease; }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .sidebar-item { transition: all 0.2s ease; }
        .sidebar-item:hover, .sidebar-item.active { background: rgba(255,255,255,0.1); }
        .loading-spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .favorite-btn { transition: all 0.2s ease; }
        .favorite-btn:hover { transform: scale(1.1); }
        .favorite-btn.active { color: #fbbf24; }
        .job-card { transition: all 0.3s ease; }
        .job-card:hover { border-color: var(--color-primary); }
    </style>
</head>
<body class="bg-gray-50 app-shell">
    <!-- noscript 提示 -->
    <noscript>
        <div style="position: fixed; top: 0; left: 0; right: 0; background: #fef3c7; border-bottom: 2px solid #f59e0b; padding: 1rem; text-align: center; z-index: 9999;">
            <i class="fas fa-exclamation-triangle" style="color: #f59e0b; margin-right: 0.5rem;"></i>
            <strong>JavaScript 已禁用</strong> - 本页面需要 JavaScript 才能正常显示收藏列表。请启用 JavaScript 后刷新页面。
        </div>
    </noscript>

    <div id="app" class="min-h-screen flex">
        <!-- 侧边栏导航容器 - 由 navbar.js 渲染 -->
        <div id="navbar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-0 md:ml-64 pt-20 md:pt-0">
            <!-- 顶部栏 -->
            <header class="bg-white shadow-sm border-b px-8 py-4 sticky top-0 z-40">
                <div class="flex items-center justify-between">
                    <h2 id="page-title" class="text-2xl font-bold text-gray-800">我的收藏</h2>
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <input type="text" id="search-input" placeholder="搜索收藏的岗位..." 
                                class="pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                        <button id="refresh-btn" class="p-2 text-gray-600 hover:text-blue-600 transition" title="刷新列表">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div id="content" class="p-8">
                <!-- 静态内容（无JS时显示） -->
                <div id="static-content">
                    <div class="text-center py-16">
                        <div class="w-20 h-20 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fas fa-star text-3xl text-yellow-500"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">我的收藏</h3>
                        <p class="text-gray-500 max-w-md mx-auto">
                            这里将显示您收藏的实习岗位。请启用 JavaScript 以加载您的收藏列表。
                        </p>
                    </div>
                </div>

                <!-- 动态内容容器 -->
                <div id="dynamic-content" class="hidden">
                    <!-- 统计信息 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-white rounded-xl p-6 shadow-sm border">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">收藏总数</p>
                                    <p class="text-3xl font-bold text-gray-800" id="total-favorites">0</p>
                                </div>
                                <div class="w-12 h-12 bg-yellow-100 rounded-lg flex items-center justify-center">
                                    <i class="fas fa-star text-yellow-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">本周新增</p>
                                    <p class="text-3xl font-bold text-gray-800" id="weekly-favorites">0</p>
                                </div>
                                <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                                    <i class="fas fa-calendar-week text-blue-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                        <div class="bg-white rounded-xl p-6 shadow-sm border">
                            <div class="flex items-center justify-between">
                                <div>
                                    <p class="text-sm text-gray-500 mb-1">今日新增</p>
                                    <p class="text-3xl font-bold text-gray-800" id="today-favorites">0</p>
                                </div>
                                <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                                    <i class="fas fa-calendar-day text-green-500 text-xl"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- 收藏列表容器 -->
                    <div id="favorites-list" class="space-y-4">
                        <!-- 加载状态 -->
                        <div id="loading-state" class="text-center py-16">
                            <div class="inline-block w-12 h-12 border-4 border-gray-200 border-t-blue-500 rounded-full loading-spinner mb-4"></div>
                            <p class="text-gray-500">正在加载收藏列表...</p>
                        </div>

                        <!-- 空状态 -->
                        <div id="empty-state" class="hidden text-center py-16">
                            <div class="w-20 h-20 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fas fa-star text-3xl text-gray-400"></i>
                            </div>
                            <h3 class="text-xl font-semibold text-gray-800 mb-2">暂无收藏</h3>
                            <p class="text-gray-500 max-w-md mx-auto mb-6">
                                您还没有收藏任何岗位。浏览岗位列表，点击星标图标即可收藏感兴趣的岗位。
                            </p>
                            <a href="./jobs.html" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                                <i class="fas fa-search"></i>
                                <span>浏览岗位</span>
                            </a>
                        </div>

                        <!-- 错误状态 -->
                        <div id="error-state" class="hidden text-center py-16">
                            <div class="w-20 h-20 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i class="fas fa-exclamation-circle text-3xl text-red-500"></i>
                            </div>
                            <h3 class="text-xl font-semibold text-gray-800 mb-2">加载失败</h3>
                            <p class="text-gray-500 max-w-md mx-auto mb-6" id="error-message">
                                无法加载收藏列表，请稍后重试。
                            </p>
                            <button onclick="loadFavorites()" class="inline-flex items-center gap-2 px-6 py-3 bg-blue-500 text-white rounded-lg hover:bg-blue-600 transition">
                                <i class="fas fa-redo"></i>
                                <span>重新加载</span>
                            </button>
                        </div>

                        <!-- 收藏列表 -->
                        <div id="favorites-grid" class="grid grid-cols-1 lg:grid-cols-2 gap-4"></div>
                    </div>

                    <!-- 分页组件 -->
                    <div id="pagination" class="hidden mt-8 flex items-center justify-between">
                        <div class="text-sm text-gray-500">
                            显示 <span id="showing-start">0</span> - <span id="showing-end">0</span> 条，共 <span id="total-items">0</span> 条
                        </div>
                        <div class="flex items-center gap-2">
                            <button id="prev-page" class="px-4 py-2 border rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                <i class="fas fa-chevron-left mr-1"></i> 上一页
                            </button>
                            <div id="page-numbers" class="flex items-center gap-1"></div>
                            <button id="next-page" class="px-4 py-2 border rounded-lg hover:bg-gray-50 disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                                下一页 <i class="fas fa-chevron-right ml-1"></i>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Toast 提示 -->
    <div id="toast" class="fixed bottom-4 right-4 z-50 hidden">
        <div class="bg-gray-800 text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3">
            <i id="toast-icon" class="fas fa-check-circle text-green-400"></i>
            <span id="toast-message">操作成功</span>
        </div>
    </div>

    <!-- 确认对话框 -->
    <div id="confirm-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-xl max-w-md w-full p-6">
            <div class="text-center">
                <div class="w-16 h-16 bg-yellow-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-question text-2xl text-yellow-500"></i>
                </div>
                <h3 class="text-lg font-semibold text-gray-800 mb-2">确认取消收藏？</h3>
                <p class="text-gray-500 mb-6">取消收藏后，该岗位将从您的收藏列表中移除。</p>
                <div class="flex items-center justify-center gap-3">
                    <button onclick="closeConfirmModal()" class="px-6 py-2 border rounded-lg hover:bg-gray-50 transition">
                        取消
                    </button>
                    <button id="confirm-unfavorite-btn" class="px-6 py-2 bg-red-500 text-white rounded-lg hover:bg-red-600 transition">
                        确认取消
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 引入JS资源 -->
    <!-- 元数据（优先加载） -->
    <script src="./data/jobs.meta.js"></script>
    <!-- 优先加载前20条数据（约100KB，快速渲染） -->
    <script src="./data/jobs.chunk.0.js"></script>
    <script src="./js/api.js?v=20260409-v395"></script>
    <script src="./js/auth.js?v=20260409-v395"></script>
    <script src="./js/logger.js"></script>
    <script src="./js/utils.js"></script>
    <script src="./js/navbar.js?v=20260409-v395"></script>
    
    <!-- 页面脚本 -->
    <script>
        // 页面状态
        const state = {
            favorites: [],
            currentPage: 1,
            pageSize: 10,
            totalItems: 0,
            totalPages: 1,
            searchKeyword: '',
            isLoading: false,
            pendingUnfavoriteId: null
        };

        // DOM 元素引用
        const elements = {
            staticContent: document.getElementById('static-content'),
            dynamicContent: document.getElementById('dynamic-content'),
            favoritesGrid: document.getElementById('favorites-grid'),
            loadingState: document.getElementById('loading-state'),
            emptyState: document.getElementById('empty-state'),
            errorState: document.getElementById('error-state'),
            errorMessage: document.getElementById('error-message'),
            pagination: document.getElementById('pagination'),
            searchInput: document.getElementById('search-input'),
            refreshBtn: document.getElementById('refresh-btn'),
            totalFavorites: document.getElementById('total-favorites'),
            weeklyFavorites: document.getElementById('weekly-favorites'),
            todayFavorites: document.getElementById('today-favorites'),
            prevPage: document.getElementById('prev-page'),
            nextPage: document.getElementById('next-page'),
            pageNumbers: document.getElementById('page-numbers'),
            showingStart: document.getElementById('showing-start'),
            showingEnd: document.getElementById('showing-end'),
            totalItems: document.getElementById('total-items'),
            toast: document.getElementById('toast'),
            toastIcon: document.getElementById('toast-icon'),
            toastMessage: document.getElementById('toast-message'),
            confirmModal: document.getElementById('confirm-modal'),
            confirmUnfavoriteBtn: document.getElementById('confirm-unfavorite-btn')
        };

        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化导航栏
            if (typeof initNavbar === 'function') {
                initNavbar('#navbar-container', 'favorites');
            }

            // 记录页面加载
            if (typeof logger !== 'undefined') {
                logger.info('Favorites page initialized');
            }

            // 显示动态内容，隐藏静态内容
            elements.staticContent.classList.add('hidden');
            elements.dynamicContent.classList.remove('hidden');

            // 加载收藏列表
            loadFavorites();

            // 绑定事件
            bindEvents();
        });

        // 绑定事件
        function bindEvents() {
            // 搜索输入
            if (elements.searchInput) {
                elements.searchInput.addEventListener('input', debounce(function(e) {
                    state.searchKeyword = e.target.value.trim();
                    state.currentPage = 1;
                    loadFavorites();
                }, 300));
            }

            // 刷新按钮
            if (elements.refreshBtn) {
                elements.refreshBtn.addEventListener('click', function() {
                    const icon = this.querySelector('i');
                    if (icon) icon.classList.add('fa-spin');
                    
                    loadFavorites().then(() => {
                        setTimeout(() => {
                            if (icon) icon.classList.remove('fa-spin');
                        }, 500);
                    });
                    
                    showToast('列表已刷新', 'info');
                });
            }

            // 分页按钮
            if (elements.prevPage) {
                elements.prevPage.addEventListener('click', () => {
                    if (state.currentPage > 1) {
                        state.currentPage--;
                        loadFavorites();
                    }
                });
            }

            if (elements.nextPage) {
                elements.nextPage.addEventListener('click', () => {
                    if (state.currentPage < state.totalPages) {
                        state.currentPage++;
                        loadFavorites();
                    }
                });
            }

            // 确认取消收藏按钮
            if (elements.confirmUnfavoriteBtn) {
                elements.confirmUnfavoriteBtn.addEventListener('click', () => {
                    if (state.pendingUnfavoriteId) {
                        confirmUnfavorite(state.pendingUnfavoriteId);
                    }
                });
            }

            // 监听全局刷新事件
            window.addEventListener('app:refresh', () => {
                loadFavorites();
            });
        }

        // 加载收藏列表
        async function loadFavorites() {
            if (state.isLoading) return;
            
            state.isLoading = true;
            showLoading(true);

            try {
                const params = {
                    page: state.currentPage,
                    page_size: state.pageSize
                };

                if (state.searchKeyword) {
                    params.keyword = state.searchKeyword;
                }

                if (typeof logger !== 'undefined') {
                    logger.logApiCall('getFavorites', params, Date.now());
                }

                const response = await API.getFavorites(params);
                
                if (typeof logger !== 'undefined') {
                    logger.logApiResponse('getFavorites', response, Date.now() - startTime, true);
                }

                // 更新状态
                state.favorites = response.items || [];
                state.totalItems = response.total || 0;
                state.totalPages = response.pages || 1;

                // 更新统计
                updateStats(response);

                // 渲染列表
                renderFavorites();

                // 渲染分页
                renderPagination();

                showLoading(false);

            } catch (error) {
                if (typeof logger !== 'undefined') {
                    logger.logApiError('getFavorites', error, Date.now() - startTime);
                }
                
                console.error('加载收藏列表失败:', error);
                showError(error.message || '加载失败，请稍后重试');
            } finally {
                state.isLoading = false;
            }
        }

        // 更新统计数据
        function updateStats(response) {
            if (elements.totalFavorites) {
                elements.totalFavorites.textContent = response.total || 0;
            }
            // 这里可以根据实际数据计算本周和今日新增
            if (elements.weeklyFavorites) {
                elements.weeklyFavorites.textContent = response.weekly_count || 0;
            }
            if (elements.todayFavorites) {
                elements.todayFavorites.textContent = response.today_count || 0;
            }
        }

        // 渲染收藏列表
        function renderFavorites() {
            if (!elements.favoritesGrid) return;

            // 清空列表
            elements.favoritesGrid.innerHTML = '';

            // 检查是否为空
            if (state.favorites.length === 0) {
                elements.emptyState.classList.remove('hidden');
                elements.pagination.classList.add('hidden');
                return;
            }

            elements.emptyState.classList.add('hidden');

            // 渲染每个收藏项
            state.favorites.forEach((job, index) => {
                const card = createFavoriteCard(job, index);
                elements.favoritesGrid.appendChild(card);
            });
        }

        // 创建收藏卡片
        function createFavoriteCard(job, index) {
            const div = document.createElement('div');
            div.className = 'job-card bg-white rounded-xl p-6 shadow-sm border border-gray-200 fade-in';
            div.style.animationDelay = `${index * 0.05}s`;

            const salary = job.salary || '薪资面议';
            const location = job.location || '地点不限';
            const company = job.company || '未知公司';
            const title = job.title || '未知岗位';
            const source = job.source || '未知来源';
            const publishDate = job.publish_date || job.created_at || '';
            const daysLeft = job.days_left || '';
            const progress = job.application_status || '未投递';

            div.innerHTML = `
                <div class="flex items-start justify-between mb-4">
                    <div class="flex-1">
                        <h3 class="text-lg font-semibold text-gray-800 mb-2 line-clamp-2">${escapeHtml(title)}</h3>
                        <div class="flex items-center gap-2 text-sm text-gray-500">
                            <i class="fas fa-building"></i>
                            <span>${escapeHtml(company)}</span>
                        </div>
                    </div>
                    <button class="favorite-btn active p-2 text-yellow-400 hover:text-yellow-500" 
                            onclick="showUnfavoriteConfirm(${job.id})"
                            title="取消收藏">
                        <i class="fas fa-star text-xl"></i>
                    </button>
                </div>
                
                <div class="flex flex-wrap gap-2 mb-4">
                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-blue-50 text-blue-600 rounded-full text-sm">
                        <i class="fas fa-map-marker-alt text-xs"></i>
                        ${escapeHtml(location)}
                    </span>
                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-green-50 text-green-600 rounded-full text-sm">
                        <i class="fas fa-yen-sign text-xs"></i>
                        ${escapeHtml(salary)}
                    </span>
                    ${daysLeft ? `
                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-orange-50 text-orange-600 rounded-full text-sm">
                        <i class="fas fa-clock text-xs"></i>
                        ${escapeHtml(daysLeft)}
                    </span>
                    ` : ''}
                    <span class="inline-flex items-center gap-1 px-3 py-1 bg-purple-50 text-purple-600 rounded-full text-sm">
                        <i class="fas fa-route text-xs"></i>
                        ${escapeHtml(progress)}
                    </span>
                </div>

                <div class="flex items-center gap-2 mb-4">
                    <select class="form-select text-sm" data-progress-select="${job.id}">
                        ${['未投递', '已收藏', '已投递', '笔试中', '面试中', '已拿Offer', '已结束'].map(status => `<option value="${status}" ${status === progress ? 'selected' : ''}>${status}</option>`).join('')}
                    </select>
                    <button class="btn btn-outline btn-sm" onclick="quickUpdateProgress(${job.id})">保存进度</button>
                </div>
                 
                <div class="flex items-center justify-between text-sm text-gray-500 pt-4 border-t border-gray-100">
                    <div class="flex items-center gap-4">
                        <span class="flex items-center gap-1">
                            <i class="fas fa-database"></i>
                            ${escapeHtml(source)}
                        </span>
                        ${publishDate ? `
                        <span class="flex items-center gap-1">
                            <i class="fas fa-calendar"></i>
                            ${formatDate(publishDate)}
                        </span>
                        ` : ''}
                    </div>
                    <a href="${job.source_url || job.apply_url || '#'}" target="_blank" 
                       class="inline-flex items-center gap-1 text-blue-500 hover:text-blue-600 transition">
                        查看详情
                        <i class="fas fa-external-link-alt text-xs"></i>
                    </a>
                </div>
            `;

            return div;
        }

        // 渲染分页
        async function quickUpdateProgress(jobId) {
            try {
                const select = document.querySelector(`[data-progress-select="${jobId}"]`);
                const status = select?.value || '未投递';
                const response = await API.updateJobProgress(jobId, { status, notes: '' });
                showToast(response.message || '求职进度已更新', 'success');
                loadFavorites();
            } catch (error) {
                showToast(error.message || '更新进度失败', 'error');
            }
        }

        // 渲染分页
        function renderPagination() {
            if (!elements.pagination) return;

            if (state.totalPages <= 1) {
                elements.pagination.classList.add('hidden');
                return;
            }

            elements.pagination.classList.remove('hidden');

            // 更新显示范围
            const start = (state.currentPage - 1) * state.pageSize + 1;
            const end = Math.min(state.currentPage * state.pageSize, state.totalItems);
            
            if (elements.showingStart) elements.showingStart.textContent = start;
            if (elements.showingEnd) elements.showingEnd.textContent = end;
            if (elements.totalItems) elements.totalItems.textContent = state.totalItems;

            // 更新按钮状态
            if (elements.prevPage) {
                elements.prevPage.disabled = state.currentPage <= 1;
            }
            if (elements.nextPage) {
                elements.nextPage.disabled = state.currentPage >= state.totalPages;
            }

            // 渲染页码
            if (elements.pageNumbers) {
                elements.pageNumbers.innerHTML = '';
                
                const maxVisiblePages = 5;
                let startPage = Math.max(1, state.currentPage - Math.floor(maxVisiblePages / 2));
                let endPage = Math.min(state.totalPages, startPage + maxVisiblePages - 1);
                
                if (endPage - startPage < maxVisiblePages - 1) {
                    startPage = Math.max(1, endPage - maxVisiblePages + 1);
                }

                for (let i = startPage; i <= endPage; i++) {
                    const btn = document.createElement('button');
                    btn.className = `px-3 py-2 rounded-lg transition ${
                        i === state.currentPage 
                            ? 'bg-blue-500 text-white' 
                            : 'border hover:bg-gray-50'
                    }`;
                    btn.textContent = i;
                    btn.addEventListener('click', () => {
                        state.currentPage = i;
                        loadFavorites();
                    });
                    elements.pageNumbers.appendChild(btn);
                }
            }
        }

        // 显示取消收藏确认对话框
        function showUnfavoriteConfirm(jobId) {
            state.pendingUnfavoriteId = jobId;
            if (elements.confirmModal) {
                elements.confirmModal.classList.remove('hidden');
            }
        }

        // 关闭确认对话框
        function closeConfirmModal() {
            state.pendingUnfavoriteId = null;
            if (elements.confirmModal) {
                elements.confirmModal.classList.add('hidden');
            }
        }

        // 确认取消收藏
        async function confirmUnfavorite(jobId) {
            closeConfirmModal();
            
            try {
                if (typeof logger !== 'undefined') {
                    logger.logApiCall('toggleFavorite', { id: jobId }, Date.now());
                }

                const response = await API.toggleFavorite(jobId);
                
                if (typeof logger !== 'undefined') {
                    logger.logApiResponse('toggleFavorite', response, Date.now() - startTime, true);
                }

                // 从列表中移除
                state.favorites = state.favorites.filter(job => job.id !== jobId);
                state.totalItems--;

                // 重新渲染
                renderFavorites();
                renderPagination();

                // 更新统计
                if (elements.totalFavorites) {
                    elements.totalFavorites.textContent = state.totalItems;
                }

                showToast('已取消收藏', 'success');

            } catch (error) {
                if (typeof logger !== 'undefined') {
                    logger.logApiError('toggleFavorite', error, Date.now() - startTime);
                }
                
                console.error('取消收藏失败:', error);
                showToast('操作失败，请重试', 'error');
            }
        }

        // 显示加载状态
        function showLoading(show) {
            if (show) {
                elements.loadingState.classList.remove('hidden');
                elements.emptyState.classList.add('hidden');
                elements.errorState.classList.add('hidden');
                elements.favoritesGrid.innerHTML = '';
            } else {
                elements.loadingState.classList.add('hidden');
            }
        }

        // 显示错误状态
        function showError(message) {
            elements.loadingState.classList.add('hidden');
            elements.emptyState.classList.add('hidden');
            elements.errorState.classList.remove('hidden');
            if (elements.errorMessage) {
                elements.errorMessage.textContent = message;
            }
        }

        // 显示Toast提示
        function showToast(message, type = 'success') {
            if (!elements.toast) return;

            const iconMap = {
                success: 'fa-check-circle text-green-400',
                error: 'fa-times-circle text-red-400',
                warning: 'fa-exclamation-circle text-yellow-400',
                info: 'fa-info-circle text-blue-400'
            };

            if (elements.toastIcon) {
                elements.toastIcon.className = `fas ${iconMap[type] || iconMap.success}`;
            }
            if (elements.toastMessage) {
                elements.toastMessage.textContent = message;
            }

            elements.toast.classList.remove('hidden');

            setTimeout(() => {
                elements.toast.classList.add('hidden');
            }, 3000);
        }

        // HTML转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 格式化日期
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return dateStr;
            
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // 防抖函数
        function debounce(fn, delay) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        // 记录开始时间（用于日志）
        let startTime = Date.now();
    </script>
</body>
</html>
