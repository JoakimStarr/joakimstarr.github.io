<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - FinIntern Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/common.css">
</head>
<body class="bg-gray-50 app-shell">
    <div id="app" class="min-h-screen flex">
        <div id="navbar-container"></div>
        <main class="flex-1 ml-0 md:ml-64 pt-20 md:pt-0">
            <header class="bg-white shadow-sm border-b px-8 py-4 sticky top-0 z-40">
                <div class="flex items-center justify-between gap-4 flex-wrap">
                    <div>
                        <h2 class="text-2xl font-bold text-gray-800">用户管理</h2>
                        <p class="mt-1 text-sm text-slate-500">管理账号、角色权限与密码重置。</p>
                    </div>
                    <button id="refresh-btn" class="btn btn-outline">
                        <i class="fas fa-sync-alt"></i>
                        刷新
                    </button>
                </div>
            </header>

            <div class="p-8 space-y-6">
                <section class="grid xl:grid-cols-[360px_1fr] gap-6">
                    <div class="card">
                        <div class="card-header">
                            <h3 class="text-lg font-semibold">新建用户</h3>
                        </div>
                        <div class="card-body space-y-4">
                            <div>
                                <label class="form-label">用户名</label>
                                <input id="create-username" class="form-input" placeholder="例如 analyst01">
                            </div>
                            <div>
                                <label class="form-label">显示名称</label>
                                <input id="create-display-name" class="form-input" placeholder="例如 数据分析同学">
                            </div>
                            <div>
                                <label class="form-label">角色</label>
                                <select id="create-role" class="form-select"></select>
                            </div>
                            <div>
                                <label class="form-label">初始密码</label>
                                <input id="create-password" type="password" class="form-input" placeholder="至少 8 位">
                            </div>
                            <label class="inline-flex items-center gap-3 text-sm text-slate-600">
                                <input id="create-active" type="checkbox" checked class="rounded border-slate-300">
                                <span>创建后立即启用账号</span>
                            </label>
                            <button id="create-user-btn" class="btn btn-primary w-full justify-center">
                                <i class="fas fa-user-plus"></i>
                                创建用户
                            </button>
                            <div id="create-message" class="hidden rounded-2xl px-4 py-3 text-sm"></div>
                        </div>
                    </div>

                    <div class="card">
                        <div class="card-header flex items-center justify-between gap-4">
                            <div>
                                <h3 class="text-lg font-semibold">用户列表</h3>
                                <p class="text-sm text-slate-500">管理员可修改角色、启停账号、重置密码或删除用户。</p>
                            </div>
                            <span id="users-count" class="inline-flex items-center rounded-full bg-slate-100 text-slate-700 px-3 py-1 text-sm font-semibold">0</span>
                        </div>
                        <div class="card-body">
                            <div id="users-empty" class="hidden rounded-3xl border border-dashed border-slate-200 bg-slate-50 px-6 py-10 text-center text-slate-500">
                                暂无用户数据
                            </div>
                            <div id="users-list" class="space-y-4"></div>
                        </div>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <script src="./js/auth.js?v=20260409-v395"></script>
    <!-- 元数据（优先加载） -->
    <script src="./data/jobs.meta.js"></script>
    <!-- 优先加载前20条数据（约100KB，快速渲染） -->
    <script src="./data/jobs.chunk.0.js"></script>
    <script src="./js/api.js?v=20260409-v395"></script>
    <script src="./js/navbar.js?v=20260409-v395"></script>
    <script>
        let roleOptions = [];
        let users = [];

        function toastMessage(targetId, message, type = 'info') {
            const box = document.getElementById(targetId);
            if (!box) return;
            box.className = `rounded-2xl px-4 py-3 text-sm ${type === 'error' ? 'bg-rose-50 text-rose-700 border border-rose-200' : 'bg-emerald-50 text-emerald-700 border border-emerald-200'}`;
            box.textContent = message;
            box.classList.remove('hidden');
        }

        function renderRoleOptions() {
            const select = document.getElementById('create-role');
            select.innerHTML = roleOptions.map(item => `<option value="${item.id}">${item.id}</option>`).join('');
        }

        function roleBadge(role) {
            const theme = role === 'admin'
                ? 'bg-rose-50 text-rose-700 border border-rose-200'
                : role === 'operator'
                    ? 'bg-blue-50 text-blue-700 border border-blue-200'
                    : 'bg-slate-100 text-slate-700 border border-slate-200';
            return `<span class="inline-flex items-center rounded-full px-3 py-1 text-xs font-semibold ${theme}">${role}</span>`;
        }

        function permissionPills(permissions = []) {
            return permissions.map(item => `<span class="inline-flex items-center rounded-full bg-slate-100 text-slate-600 px-2.5 py-1 text-[11px] font-medium">${item}</span>`).join('');
        }

        function renderUsers() {
            const list = document.getElementById('users-list');
            const empty = document.getElementById('users-empty');
            const count = document.getElementById('users-count');
            count.textContent = String(users.length);

            if (!users.length) {
                list.innerHTML = '';
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            list.innerHTML = users.map(user => `
                <article class="rounded-3xl border border-slate-200 bg-white px-5 py-5 shadow-sm">
                    <div class="flex items-start justify-between gap-4 flex-wrap">
                        <div class="min-w-0">
                            <div class="flex items-center gap-3 flex-wrap">
                                <h4 class="text-lg font-semibold text-slate-900">${user.display_name || user.username}</h4>
                                ${roleBadge(user.role)}
                                ${user.is_active ? '<span class="inline-flex items-center rounded-full bg-emerald-50 text-emerald-700 px-3 py-1 text-xs font-semibold border border-emerald-200">启用中</span>' : '<span class="inline-flex items-center rounded-full bg-slate-100 text-slate-600 px-3 py-1 text-xs font-semibold border border-slate-200">已停用</span>'}
                            </div>
                            <div class="mt-2 text-sm text-slate-500">
                                <span>用户名：${user.username}</span>
                                <span class="mx-2 text-slate-300">|</span>
                                <span>最近登录：${user.last_login_at || '暂无'}</span>
                            </div>
                            <div class="mt-3 flex flex-wrap gap-2">${permissionPills(user.permissions || [])}</div>
                        </div>
                        <div class="flex gap-2 flex-wrap">
                            <button class="btn btn-outline" onclick="openEditDialog(${user.id})"><i class="fas fa-pen"></i> 编辑</button>
                            <button class="btn btn-outline" onclick="resetPassword(${user.id})"><i class="fas fa-key"></i> 重置密码</button>
                            ${user.username === 'admin' ? '' : `<button class="btn btn-outline text-rose-600 border-rose-200 hover:bg-rose-50" onclick="deleteUserRecord(${user.id})"><i class="fas fa-trash"></i> 删除</button>`}
                        </div>
                    </div>
                </article>
            `).join('');
        }

        async function loadUsers() {
            const [rolesResp, usersResp] = await Promise.all([API.getRoles(), API.getUsers()]);
            roleOptions = rolesResp.roles || [];
            users = usersResp || [];
            renderRoleOptions();
            renderUsers();
        }

        async function createUser() {
            const username = document.getElementById('create-username').value.trim();
            const displayName = document.getElementById('create-display-name').value.trim();
            const role = document.getElementById('create-role').value;
            const password = document.getElementById('create-password').value;
            const isActive = document.getElementById('create-active').checked;
            if (!username || !password) {
                toastMessage('create-message', '请填写用户名和初始密码', 'error');
                return;
            }
            try {
                await API.createUser({
                    username,
                    display_name: displayName || username,
                    role,
                    password,
                    is_active: isActive,
                });
                toastMessage('create-message', '用户创建成功');
                document.getElementById('create-password').value = '';
                document.getElementById('create-username').value = '';
                document.getElementById('create-display-name').value = '';
                await loadUsers();
            } catch (error) {
                toastMessage('create-message', error.message || '创建失败', 'error');
            }
        }

        async function openEditDialog(userId) {
            const target = users.find(item => item.id === userId);
            if (!target) return;
            const nextDisplayName = window.prompt('请输入新的显示名称', target.display_name || target.username);
            if (nextDisplayName === null) return;
            const nextRole = window.prompt(`请输入角色（${roleOptions.map(item => item.id).join(' / ')}）`, target.role);
            if (nextRole === null) return;
            const activeText = window.prompt('是否启用账号？请输入 yes 或 no', target.is_active ? 'yes' : 'no');
            if (activeText === null) return;
            try {
                await API.updateUser(userId, {
                    display_name: nextDisplayName.trim(),
                    role: nextRole.trim(),
                    is_active: /^y(es)?$/i.test(activeText.trim()),
                });
                await loadUsers();
            } catch (error) {
                alert(error.message || '更新失败');
            }
        }

        async function resetPassword(userId) {
            const password = window.prompt('请输入新的密码（至少 8 位）');
            if (!password) return;
            try {
                await API.resetUserPassword(userId, { password });
                alert('密码已重置');
            } catch (error) {
                alert(error.message || '重置密码失败');
            }
        }

        async function deleteUserRecord(userId) {
            if (!window.confirm('确认删除这个用户吗？删除后不可恢复。')) return;
            try {
                await API.deleteUser(userId);
                await loadUsers();
            } catch (error) {
                alert(error.message || '删除失败');
            }
        }

        document.getElementById('create-user-btn').addEventListener('click', createUser);
        document.getElementById('refresh-btn').addEventListener('click', loadUsers);

        (async () => {
            const user = await AppAuth.requireAuth('manage_users');
            if (!user) return;
            await initNavbar('#navbar-container', 'users');
            await loadUsers();
        })();
    </script>
</body>
</html>
