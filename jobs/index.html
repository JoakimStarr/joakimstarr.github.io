<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="FinIntern Hub - 金融实习招聘平台，汇聚全网金融实习岗位">
    <meta name="keywords" content="金融实习, 实习岗位, 招聘, FinIntern">
    <meta name="author" content="FinIntern Hub">
    <meta name="theme-color" content="#3b82f6">
    <title>首页 - FinIntern Hub</title>

    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>

    <!-- 公共资源 -->
    <link rel="stylesheet" href="./css/common.css">
</head>
<body class="bg-gray-50 app-shell">
    <!-- noscript 提示 -->
    <noscript>
        <div style="padding: 20px; background: #fef3c7; border: 1px solid #f59e0b; text-align: center;">
            <i class="fas fa-exclamation-triangle" style="color: #f59e0b; margin-right: 10px;"></i>
            <strong>请启用 JavaScript</strong> 以获得最佳浏览体验。部分功能需要 JavaScript 支持。
        </div>
    </noscript>

    <div id="app" class="min-h-screen flex">
        <!-- 侧边栏导航容器 - 由 navbar.js 渲染 -->
        <div id="navbar-container"></div>

        <!-- 主内容区 -->
        <main class="flex-1 ml-0 md:ml-64 pt-20 md:pt-0">
            <!-- 顶部栏 -->
            <header class="bg-white shadow-sm border-b px-8 py-4 sticky top-0 z-40">
                <div class="flex items-center justify-between">
                    <h2 id="page-title" class="text-2xl font-bold text-gray-800">首页</h2>
                    <div class="flex items-center gap-4">
                        <!-- 搜索框 -->
                        <div class="relative">
                            <input type="text" id="global-search" placeholder="搜索岗位..."
                                class="pl-10 pr-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
                            <i class="fas fa-search absolute left-3 top-3 text-gray-400"></i>
                        </div>
                        <!-- 刷新按钮 -->
                        <button id="refresh-btn" class="p-2 text-gray-600 hover:text-blue-600 transition" onclick="handleRefresh()">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                </div>
            </header>

            <!-- 页面内容 -->
            <div id="content" class="p-8">
                <!-- 统计卡片区域 -->
                <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
                    <!-- 总岗位数 -->
                    <div class="card card-hover p-6 border border-blue-100 bg-gradient-to-br from-blue-50 to-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600 mb-1">总岗位数</p>
                                <p id="stat-total-jobs" class="text-3xl font-bold text-slate-900 tracking-tight">--</p>
                            </div>
                            <div class="stat-icon-wrapper bg-blue-100 text-blue-600">
                                <i class="fas fa-briefcase text-xl"></i>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center text-sm text-slate-600">
                            <span class="flex items-center gap-1">
                                <i class="fas fa-sync-alt"></i>
                                <span id="data-freshness">数据实时更新</span>
                            </span>
                        </div>
                    </div>

                    <!-- 收藏岗位 -->
                    <div class="card card-hover p-6 border border-violet-100 bg-gradient-to-br from-violet-50 to-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600 mb-1">收藏岗位</p>
                                <p id="stat-favorite-jobs" class="text-3xl font-bold text-slate-900 tracking-tight">--</p>
                            </div>
                            <div class="stat-icon-wrapper bg-violet-100 text-violet-600">
                                <i class="fas fa-star text-xl"></i>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center text-sm">
                            <a href="./favorites.html" class="text-slate-700 hover:text-violet-700 transition font-medium">
                                查看收藏 <i class="fas fa-arrow-right ml-1"></i>
                            </a>
                        </div>
                    </div>

                    <!-- 今日新增 -->
                    <div class="card card-hover p-6 border border-emerald-100 bg-gradient-to-br from-emerald-50 to-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600 mb-1">今日新增</p>
                                <p id="stat-today-jobs" class="text-3xl font-bold text-slate-900 tracking-tight">--</p>
                            </div>
                            <div class="stat-icon-wrapper bg-emerald-100 text-emerald-600">
                                <i class="fas fa-plus-circle text-xl"></i>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center text-sm text-slate-600">
                            <span>今日采集的新岗位</span>
                        </div>
                    </div>

                    <!-- 数据来源 -->
                    <div class="card card-hover p-6 border border-amber-100 bg-gradient-to-br from-amber-50 to-white">
                        <div class="flex items-center justify-between">
                            <div>
                                <p class="text-sm font-semibold text-slate-600 mb-1">数据来源</p>
                                <p id="stat-sources-count" class="text-3xl font-bold text-slate-900 tracking-tight">--</p>
                            </div>
                            <div class="stat-icon-wrapper bg-amber-100 text-amber-600">
                                <i class="fas fa-database text-xl"></i>
                            </div>
                        </div>
                        <div class="mt-4 flex items-center text-sm">
                            <a href="./crawler.html" class="text-slate-700 hover:text-amber-700 transition font-medium">
                                管理数据源 <i class="fas fa-arrow-right ml-1"></i>
                            </a>
                        </div>
                    </div>
                </section>

                <!-- 热门关键词区域 -->
                <section class="card mb-8">
                    <div class="card-header">
                        <div class="flex items-center gap-2">
                            <i class="fas fa-fire text-red-500"></i>
                            <h3 class="text-lg font-semibold">热门关键词</h3>
                        </div>
                    </div>
                    <div class="card-body">
                        <div id="hot-keywords" class="flex flex-wrap gap-3">
                            <!-- 静态占位内容（无JS时显示） -->
                            <span class="px-4 py-2 bg-gray-100 rounded-full text-sm text-gray-600">加载中...</span>
                        </div>
                    </div>
                </section>

                <!-- 最新岗位列表区域 -->
                <section class="card">
                    <div class="card-header">
                        <div class="flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <i class="fas fa-clock text-blue-500"></i>
                                <h3 class="text-lg font-semibold">最新岗位</h3>
                            </div>
                            <a href="./jobs.html" class="text-primary text-sm hover:underline">
                                查看全部 <i class="fas fa-arrow-right"></i>
                            </a>
                        </div>
                    </div>
                    <div class="card-body p-0">
                        <div id="latest-jobs-list" class="divide-y divide-gray-200">
                            <!-- 静态占位内容（无JS时显示） -->
                            <div class="p-6 text-center text-gray-500">
                                <i class="fas fa-spinner fa-spin mr-2"></i>
                                正在加载最新岗位...
                            </div>
                        </div>
                    </div>
                    <div class="card-footer">
                        <a href="./jobs.html" class="btn btn-primary w-full">
                            <i class="fas fa-list"></i>
                            浏览全部岗位
                        </a>
                    </div>
                </section>
            </div>
        </main>
    </div>

    <div id="job-modal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl max-w-3xl w-full max-h-[90vh] overflow-y-auto shadow-2xl">
            <div class="sticky top-0 bg-white/95 backdrop-blur border-b px-6 py-4 flex items-center justify-between">
                <div>
                    <h3 class="text-lg font-semibold text-gray-900">岗位详情</h3>
                    <p class="text-sm text-gray-500">查看结构化后的岗位画像与投递入口</p>
                </div>
                <button onclick="closeJobModal()" class="text-gray-400 hover:text-gray-700 transition">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <div id="job-modal-content" class="p-6">
                <div class="text-center py-12 text-gray-500">
                    <i class="fas fa-spinner fa-spin mr-2"></i>正在加载岗位详情...
                </div>
            </div>
        </div>
    </div>

    <!-- 公共资源脚本 -->
    <script src="./js/logger.js"></script>
    <script src="./js/utils.js"></script>
    <!-- 元数据（优先加载） -->
    <script src="./data/jobs.meta.js"></script>
    <!-- 优先加载前20条数据（约100KB，快速渲染） -->
    <script src="./data/jobs.chunk.0.js"></script>
    <script src="./js/api.js?v=20260405-v391"></script>
    <script src="./js/auth.js?v=20260405-v391"></script>
    <script src="./js/navbar.js?v=20260405-v391"></script>
    <script src="./js/ui-components.js?v=20260405-v391"></script>
    <script src="./js/notification.js"></script>

    <!-- 页面脚本 -->
    <script>
        // 数据更新监听器停止函数
        let stopDataListener = null;
        let currentJobId = null;
        let aiHistory = [];
        const dashboardState = {
            overview: null,
            latestJobs: [],
            hotKeywords: [],
        };

        // ==================== 页面初始化 ====================
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化日志
            if (typeof Logger !== 'undefined') {
                Logger.info('首页', '页面初始化开始');
            }

            // 初始化导航栏
            initNavbar('#navbar-container', 'home');

            // 加载页面数据
            loadDashboardData();

            // 绑定搜索框事件
            bindSearchEvents();

            // 监听刷新事件
            window.addEventListener('app:refresh', function() {
                loadDashboardData();
            });
            window.addEventListener('app:view-mode-change', function() {
                renderVisualOverview();
                renderHotKeywords(dashboardState.hotKeywords);
                renderLatestJobs(dashboardState.latestJobs);
            });

            // 启动数据更新监听（每5秒检查一次）
            if (typeof API !== 'undefined' && typeof showDataUpdateNotification === 'function') {
                stopDataListener = API.startDataUpdateListener((newCount, totalCount) => {
                    Logger.info('首页', `检测到 ${newCount} 条新数据`);
                    showDataUpdateNotification(newCount);
                }, 5000);
            }

            if (typeof Logger !== 'undefined') {
                Logger.info('首页', '页面初始化完成');
            }
        });

        // 页面卸载时停止监听
        window.addEventListener('beforeunload', function() {
            if (stopDataListener) {
                stopDataListener();
            }
        });

        // ==================== 数据加载 ====================

        /**
         * 加载仪表盘数据
         */
        async function loadDashboardData() {
            try {
                showLoadingState();

                // 并行加载统计数据和最新岗位
                await Promise.all([
                    loadStatsData(),
                    loadLatestJobs()
                ]);

                // 加载热门关键词
                await loadHotKeywords();

                if (typeof Logger !== 'undefined') {
                    Logger.info('首页', '仪表盘数据加载完成');
                }
            } catch (error) {
                handleError(error, '加载仪表盘数据失败');
            }
        }

        /**
         * 加载统计数据
         */
        async function loadStatsData() {
            try {
                // 优先从元数据获取总岗位数（包含完整数据量信息）
                const meta = (window.JOBWEB_META && window.JOBWEB_META.meta) || {};
                const stats = (window.JOBWEB_META && window.JOBWEB_META.stats) || {};
                const totalJobsFromMeta = meta.total_jobs || stats.total_jobs || 0;

                // 尝试从API获取其他动态数据
                let apiData = {};
                try {
                    if (typeof API !== 'undefined') {
                        apiData = await API.getStatsOverview();
                    }
                } catch (error) {
                    if (typeof Logger !== 'undefined') {
                        Logger.warn('首页', 'API获取统计数据失败', error);
                    }
                }

                // 合并数据：使用元数据的总岗位数，其他数据从API获取
                const overview = {
                    total_jobs: totalJobsFromMeta || (apiData.overview && apiData.overview.total_jobs) || 0,
                    favorite_jobs: (apiData.overview && apiData.overview.favorite_jobs) || 0,
                    today_jobs: (apiData.overview && apiData.overview.today_jobs) || 0,
                    sources_count: (apiData.overview && apiData.overview.sources_count) || 0
                };

                dashboardState.overview = overview;
                updateStatsCards(overview);
                renderVisualOverview();
                return { overview: overview, hot_keywords: (apiData && apiData.hot_keywords) || [] };

            } catch (error) {
                if (typeof Logger !== 'undefined') {
                    Logger.warn('首页', '加载统计数据失败', error);
                }
            }

            // 出错时尝试从元数据获取
            const meta = (window.JOBWEB_META && window.JOBWEB_META.meta) || {};
            const stats = (window.JOBWEB_META && window.JOBWEB_META.stats) || {};
            const fallbackData = {
                total_jobs: meta.total_jobs || stats.total_jobs || 0,
                favorite_jobs: 0,
                today_jobs: 0,
                sources_count: stats.sources_count || 0
            };
            dashboardState.overview = fallbackData;
            updateStatsCards(fallbackData);
            renderVisualOverview();
            return { overview: fallbackData };
        }

        /**
         * 更新统计卡片
         */
        function updateStatsCards(overview) {
            const elements = {
                'stat-total-jobs': overview.total_jobs || 0,
                'stat-favorite-jobs': overview.favorite_jobs || 0,
                'stat-today-jobs': overview.today_jobs || 0,
                'stat-sources-count': overview.sources_count || 0
            };

            for (const [id, value] of Object.entries(elements)) {
                const element = document.getElementById(id);
                if (element) {
                    // 数字动画效果
                    animateNumber(element, value);
                }
            }
        }

        /**
         * 数字动画
         */
        function animateNumber(element, targetValue) {
            if (typeof animateCountUp === 'function') {
                animateCountUp(element, Number(targetValue || 0), { duration: 920 });
                return;
            }
            element.textContent = Number(targetValue || 0).toLocaleString('zh-CN');
        }

        /**
         * 加载热门关键词
         */
        async function loadHotKeywords() {
            const container = document.getElementById('hot-keywords');
            if (!container) return;

            try {
                // 尝试从API获取数据
                let keywords = [];
                if (typeof API !== 'undefined') {
                    const data = await API.getStatsOverview();
                    keywords = data.hot_keywords || [];
                }

                // 如果没有数据，使用默认关键词
                if (!keywords || keywords.length === 0) {
                    keywords = ['投行', '行研', '量化', '固收', '资管', '券商', '基金', 'PE/VC'];
                }

                renderHotKeywords(keywords);
            } catch (error) {
                // 使用默认关键词
                const defaultKeywords = ['投行', '行研', '量化', '固收', '资管', '券商', '基金', 'PE/VC'];
                renderHotKeywords(defaultKeywords);
            }
        }

        /**
         * 渲染热门关键词
         */
        function renderHotKeywords(keywords) {
            const container = document.getElementById('hot-keywords');
            if (!container) return;
            dashboardState.hotKeywords = Array.isArray(keywords) ? keywords : [];
            renderVisualOverview();

            const colors = [
                'bg-blue-100 text-blue-700',
                'bg-green-100 text-green-700',
                'bg-yellow-100 text-yellow-700',
                'bg-purple-100 text-purple-700',
                'bg-pink-100 text-pink-700',
                'bg-indigo-100 text-indigo-700'
            ];

            container.innerHTML = keywords.map((keyword, index) => {
                const colorClass = colors[index % colors.length];
                const label = typeof keyword === 'string' ? keyword : (keyword.keyword || '');
                const count = typeof keyword === 'string' ? '' : (keyword.count ? keyword.count : '');
                return `
                    <a href="./jobs.html?keyword=${encodeURIComponent(label)}"
                       class="px-4 py-2 rounded-full text-sm font-medium ${colorClass} hover:opacity-80 transition cursor-pointer reveal-up">
                        <span>${escapeHtml(label)}</span>
                        ${count ? `<span class="opacity-70">(${count})</span>` : ''}
                    </a>
                `;
            }).join('');
        }

        /**
         * 加载最新岗位
         */
        async function loadLatestJobs() {
            const container = document.getElementById('latest-jobs-list');
            if (!container) return;

            try {
                let jobs = [];

                // 尝试从API获取数据
                if (typeof API !== 'undefined') {
                    const data = await API.getJobs({ page: 1, page_size: 5 });
                    jobs = data.items || [];
                }

                renderLatestJobs(jobs);
            } catch (error) {
                // 显示空状态
                renderLatestJobs([]);
            }
        }

        /**
         * 渲染最新岗位列表
         */
        function renderLatestJobs(jobs) {
            const container = document.getElementById('latest-jobs-list');
            if (!container) return;
            dashboardState.latestJobs = Array.isArray(jobs) ? jobs : [];

            if (!jobs || jobs.length === 0) {
                container.innerHTML = `
                    <div class="p-12 text-center">
                        <div class="w-24 h-24 bg-gradient-to-br from-blue-100 to-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i class="fas fa-search text-4xl text-blue-500"></i>
                        </div>
                        <h3 class="text-xl font-semibold text-gray-800 mb-2">暂无职位数据</h3>
                        <p class="text-gray-500 mb-6 max-w-md mx-auto">还没有采集到任何职位信息。点击下方按钮开始采集数据，或稍后再来查看。</p>
                        <a href="./crawler.html" class="inline-flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white rounded-lg hover:from-blue-700 hover:to-indigo-700 transition-all shadow-lg hover:shadow-xl">
                            <i class="fas fa-rocket"></i>
                            <span>开始采集数据</span>
                        </a>
                    </div>
                `;
                return;
            }

            container.innerHTML = jobs.map(job => {
                const publishedText = job.publish_date ? `发布于 ${escapeHtml(formatAbsoluteDate(job.publish_date))}` : '发布时间待补充';
                const summary = cleanJobText(job.requirements || job.description || '暂无职位描述');
                const chips = [job.job_type, job.industry, job.category, job.education].filter(Boolean).slice(0, 3);
                return `
                <div class="p-6 hover:bg-slate-50 transition cursor-pointer" onclick="showJobDetail(${job.id})">
                    <div class="flex items-start justify-between gap-4">
                        <div class="flex-1 min-w-0">
                            <div class="flex items-center gap-3 mb-2">
                                <h4 class="font-semibold text-gray-900 hover:text-blue-600 text-lg leading-snug">${escapeHtml(job.title)}</h4>
                                ${job.is_favorite ? '<i class="fas fa-star text-yellow-500"></i>' : ''}
                            </div>
                            <div class="flex flex-wrap items-center gap-x-4 gap-y-2 text-sm text-gray-500 mb-3">
                                <span class="flex items-center gap-1">
                                    <i class="fas fa-building"></i>
                                    ${escapeHtml(job.company || '未知公司')}
                                </span>
                                <span class="flex items-center gap-1">
                                    <i class="fas fa-map-marker-alt"></i>
                                    ${escapeHtml(job.location || '地点不限')}
                                </span>
                                <span class="flex items-center gap-1 text-blue-600">
                                    <i class="fas fa-clock"></i>
                                    ${publishedText}
                                </span>
                            </div>
                            <div class="flex flex-wrap gap-2 mb-3">
                                ${chips.map(chip => `<span class="inline-flex items-center px-3 py-1 rounded-full bg-slate-100 text-slate-700 text-xs font-medium">${escapeHtml(chip)}</span>`).join('')}
                            </div>
                            <p class="text-sm text-gray-600 leading-6 line-clamp-2">${escapeHtml(summary)}</p>
                        </div>
                        <div class="flex flex-col items-end gap-3">
                            <div class="text-right">
                                <div class="text-xs uppercase tracking-wide text-gray-400">薪资 / 经验</div>
                                <div class="text-lg font-bold text-blue-600 mt-1">${escapeHtml(job.salary || '薪资面议')}</div>
                                <div class="text-xs text-gray-500 mt-1">${escapeHtml(job.experience || '经验不限')}</div>
                            </div>
                            <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation(); toggleJobFavorite(${job.id})" title="${job.is_favorite ? '取消收藏' : '收藏'}">
                                <i class="${job.is_favorite ? 'fas' : 'far'} fa-star ${job.is_favorite ? 'text-yellow-500' : ''}"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `}).join('');
        }

        function renderVisualOverview() {
            const content = document.getElementById('content');
            if (!content) return;

            let section = document.getElementById('dashboard-visual-overview');
            if (!section) {
                section = document.createElement('section');
                section.id = 'dashboard-visual-overview';
                section.className = 'grid grid-cols-1 xl:grid-cols-[1.15fr_0.85fr] gap-6 mb-8 view-visual-only';
                const keywordSection = document.getElementById('hot-keywords')?.closest('section');
                if (keywordSection) {
                    content.insertBefore(section, keywordSection);
                } else {
                    content.appendChild(section);
                }
            }

            const isVisualMode = typeof getDisplayMode === 'function' ? getDisplayMode() === 'visual' : true;
            if (!isVisualMode) {
                section.innerHTML = '';
                return;
            }

            const overview = dashboardState.overview || {};
            const totalJobs = Number(overview.total_jobs || 0);
            const favoriteJobs = Number(overview.favorite_jobs || 0);
            const todayJobs = Number(overview.today_jobs || 0);
            const sourcesCount = Number(overview.sources_count || 0);
            const keywordItems = (dashboardState.hotKeywords || []).slice(0, 6).map((item, index) => ({
                label: typeof item === 'string' ? item : (item.keyword || `关键词 ${index + 1}`),
                value: typeof item === 'string' ? Math.max(1, 6 - index) : Number(item.count || 0),
            }));

            section.innerHTML = `
                ${renderVisualBarPanel({
                    title: '热门方向分布',
                    items: keywordItems,
                    tone: 'blue',
                    emptyText: '等待关键词数据完成加载',
                    icon: 'fa-fire'
                })}
                <div class="grid grid-cols-1 gap-6">
                    ${renderVisualRing({
                        label: '收藏占比',
                        value: favoriteJobs,
                        total: Math.max(totalJobs, 1),
                        tone: 'amber',
                        caption: '收藏岗位 / 全部岗位',
                        icon: 'fa-star'
                    })}
                    ${renderVisualRing({
                        label: '今日活跃度',
                        value: todayJobs,
                        total: Math.max(totalJobs, 1),
                        tone: 'emerald',
                        caption: `覆盖 ${sourcesCount || 0} 个数据来源`,
                        icon: 'fa-wave-square'
                    })}
                </div>
            `;
            if (typeof animateCountUpIn === 'function') {
                animateCountUpIn(section);
            }
        }

        // ==================== 事件处理 ====================

        /**
         * 绑定搜索事件
         */
        function bindSearchEvents() {
            const searchInput = document.getElementById('global-search');
            if (searchInput) {
                // 回车键搜索
                searchInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        const keyword = this.value.trim();
                        if (keyword) {
                            window.location.href = `./jobs.html?keyword=${encodeURIComponent(keyword)}`;
                        }
                    }
                });
            }
        }

        /**
         * 切换岗位收藏状态
         */
        async function toggleJobFavorite(jobId) {
            try {
                if (typeof API !== 'undefined') {
                    await API.toggleFavorite(jobId);
                    // 刷新列表
                    loadLatestJobs();

                    // 刷新统计数据
                    loadStatsData();
                }
            } catch (error) {
                handleError(error, '操作失败');
            }
        }

        /**
         * 处理刷新按钮点击
         */
        function handleRefresh() {
            const refreshBtn = document.getElementById('refresh-btn');
            if (refreshBtn) {
                const icon = refreshBtn.querySelector('i');
                if (icon) {
                    icon.classList.add('fa-spin');
                }
            }

            // 触发刷新事件
            window.dispatchEvent(new CustomEvent('app:refresh'));

            // 模拟刷新完成
            setTimeout(() => {
                if (refreshBtn) {
                    const icon = refreshBtn.querySelector('i');
                    if (icon) {
                        icon.classList.remove('fa-spin');
                    }
                }
            }, 1000);
        }

        /**
         * 切换移动端菜单
         */
        function toggleMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (sidebar && overlay) {
                const isOpen = !sidebar.classList.contains('-translate-x-full');

                if (isOpen) {
                    closeMobileMenu();
                } else {
                    sidebar.classList.remove('-translate-x-full');
                    overlay.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                }
            }
        }

        /**
         * 关闭移动端菜单
         */
        function closeMobileMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');

            if (sidebar && overlay) {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
                document.body.style.overflow = '';
            }
        }

        // ==================== 工具函数 ====================

        /**
         * 显示加载状态
         */
        function showLoadingState() {
            const elements = ['stat-total-jobs', 'stat-favorite-jobs', 'stat-today-jobs', 'stat-sources-count'];
            elements.forEach(id => {
                const element = document.getElementById(id);
                if (element) {
                    element.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
                }
            });
        }

        /**
         * 处理错误
         */
        function handleError(error, message) {
            if (typeof Logger !== 'undefined') {
                Logger.error('首页', message, error);
            } else {
                console.error(message, error);
            }

            // 显示错误提示（可选）
            // showToast(message, 'error');
        }

        /**
         * HTML转义
         */
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function cleanJobText(text) {
            if (!text) return '';
            const html = String(text)
                .replace(/<br\s*\/?>/gi, '\n')
                .replace(/<\/p>/gi, '\n')
                .replace(/<\/div>/gi, '\n')
                .replace(/<\/li>/gi, '\n');
            const container = document.createElement('div');
            container.innerHTML = html;
            return (container.textContent || '')
                .replace(/\u00a0/g, ' ')
                .replace(/\n{3,}/g, '\n\n')
                .trim();
        }

        /**
         * 格式化日期
         */
        function formatDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            const now = new Date();
            const diffDays = Math.floor((now - date) / (1000 * 60 * 60 * 24));

            if (diffDays === 0) return '今天';
            if (diffDays === 1) return '昨天';
            if (diffDays < 7) return `${diffDays}天前`;

            return date.toLocaleDateString('zh-CN');
        }

        function formatAbsoluteDate(dateString) {
            if (!dateString) return '';
            const date = new Date(dateString);
            if (Number.isNaN(date.getTime())) {
                return dateString;
            }
            return date.toLocaleDateString('zh-CN');
        }

        /**
         * 获取相对时间（多久前）
         */
        function getRelativeTime(dateString) {
            if (!dateString) return '未知时间';
            const date = new Date(dateString);
            const now = new Date();
            const diffMs = now - date;
            const diffSec = Math.floor(diffMs / 1000);
            const diffMin = Math.floor(diffSec / 60);
            const diffHour = Math.floor(diffMin / 60);
            const diffDay = Math.floor(diffHour / 24);
            const diffWeek = Math.floor(diffDay / 7);
            const diffMonth = Math.floor(diffDay / 30);

            if (diffSec < 60) return '刚刚';
            if (diffMin < 60) return `${diffMin}分钟前`;
            if (diffHour < 24) return `${diffHour}小时前`;
            if (diffDay < 7) return `${diffDay}天前`;
            if (diffWeek < 4) return `${diffWeek}周前`;
            if (diffMonth < 12) return `${diffMonth}个月前`;
            return date.toLocaleDateString('zh-CN');
        }

        // ==================== 响应式处理 ====================

        // 监听窗口大小变化
        window.addEventListener('resize', debounce(function() {
            if (window.innerWidth >= 768) {
                closeMobileMenu();
            }
        }, 100));

        // ESC键关闭菜单
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeMobileMenu();
            }
        });

        /**
         * 防抖函数
         */
        function debounce(fn, delay = 300) {
            let timer = null;
            return function(...args) {
                clearTimeout(timer);
                timer = setTimeout(() => fn.apply(this, args), delay);
            };
        }

        /**
         * 显示岗位详情弹窗
         */
        async function showJobDetail(jobId) {
            // 确保 jobId 是有效的
            if (!jobId || jobId === 'undefined' || jobId === 'null') {
                console.error('Invalid jobId:', jobId);
                alert('岗位ID无效');
                return;
            }
            
            // 转换为数字
            const id = parseInt(jobId, 10);
            if (isNaN(id)) {
                console.error('Invalid jobId (NaN):', jobId);
                alert('岗位ID格式错误');
                return;
            }
            
            try {
                if (typeof API !== 'undefined') {
                    const job = await API.getJob(id);
                    currentJobId = id;
                    aiHistory = [];
                    const imageTags = String(job.tags || '')
                        .split(/[，,]/)
                        .map(tag => tag.trim())
                        .filter(Boolean)
                        .slice(0, 6);
                    const description = cleanJobText(job.description) || '暂无描述';
                    const requirements = cleanJobText(job.requirements);

                    document.getElementById('job-modal-content').innerHTML = `
                        <div class="space-y-6">
                            <div class="flex items-start justify-between">
                                <div>
                                    <div class="flex flex-wrap items-center gap-2 mb-3">
                                        <span class="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 text-blue-700 text-xs font-semibold">${escapeHtml(job.source || '未知来源')}</span>
                                        ${job.publish_date ? `<span class="text-xs text-gray-500">发布于 ${escapeHtml(formatAbsoluteDate(job.publish_date))}</span>` : ''}
                                    </div>
                                    <h2 class="text-2xl font-bold text-gray-900 leading-snug">${escapeHtml(job.title)}</h2>
                                    <p class="text-lg text-gray-600 mt-2">${escapeHtml(job.company || '未知公司')}</p>
                                </div>
                                <button onclick="toggleJobFavorite(${job.id})" class="p-2 text-2xl ${job.is_favorite ? 'text-yellow-400' : 'text-gray-300'} hover:text-yellow-400">
                                    <i class="${job.is_favorite ? 'fas' : 'far'} fa-star"></i>
                                </button>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 bg-gray-50 p-4 rounded-xl">
                                <div><i class="fas fa-map-marker-alt text-gray-400 mr-2"></i>${escapeHtml(job.location || '地点不限')}</div>
                                <div><i class="fas fa-yen-sign text-gray-400 mr-2"></i>${escapeHtml(job.salary || '薪资面议')}</div>
                                <div><i class="fas fa-briefcase text-gray-400 mr-2"></i>${escapeHtml(job.job_type || '未识别')}</div>
                                <div><i class="fas fa-industry text-gray-400 mr-2"></i>${escapeHtml(job.industry || '待识别')}</div>
                                <div><i class="fas fa-sitemap text-gray-400 mr-2"></i>${escapeHtml(job.category || '待分类')}</div>
                                <div><i class="fas fa-graduation-cap text-gray-400 mr-2"></i>${escapeHtml(job.education || '学历不限')}</div>
                                <div><i class="fas fa-chart-line text-gray-400 mr-2"></i>${escapeHtml(job.experience || '经验不限')}</div>
                                <div><i class="fas fa-database text-gray-400 mr-2"></i>${escapeHtml(job.source || '未知来源')}</div>
                            </div>
                            ${imageTags.length ? `
                            <div>
                                <h3 class="font-bold mb-3 text-gray-900">岗位画像</h3>
                                <div class="flex flex-wrap gap-2">
                                    ${imageTags.map(tag => `<span class="inline-flex items-center px-3 py-1 rounded-full bg-slate-100 text-slate-700 text-xs font-medium">${escapeHtml(tag)}</span>`).join('')}
                                </div>
                            </div>
                            ` : ''}
                            <div>
                                <h3 class="font-bold mb-2">岗位描述</h3>
                                <p class="text-gray-600 whitespace-pre-line leading-7">${escapeHtml(description)}</p>
                            </div>
                            ${requirements ? `
                            <div>
                                <h3 class="font-bold mb-2">任职要求</h3>
                                <p class="text-gray-600 whitespace-pre-line leading-7">${escapeHtml(requirements)}</p>
                            </div>
                            ` : ''}
                            <div class="bg-slate-50 rounded-2xl p-5 border border-slate-200">
                                <div class="flex items-center justify-between gap-3 mb-4">
                                    <div>
                                        <h3 class="font-bold text-slate-900">AI 推荐分析</h3>
                                        <p class="text-sm text-slate-500">针对当前岗位生成匹配度判断、投递建议与风险提醒，并支持继续追问。</p>
                                    </div>
                                    <button class="inline-flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition" onclick="requestHomeJobAIAnalysis()">
                                        <i class="fas fa-sparkles"></i> 生成分析
                                    </button>
                                </div>
                                <div id="home-ai-analysis-result" class="bg-white rounded-xl border border-slate-200 p-4 text-sm text-slate-600 whitespace-pre-line min-h-[140px]">点击“生成分析”后，这里会输出岗位推荐结论。</div>
                                <div class="mt-4 flex gap-3">
                                    <textarea id="home-ai-question-input" class="flex-1 border rounded-lg px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500 min-h-[92px]" placeholder="继续问这个岗位，比如：金融硕士投这个岗位竞争力如何？"></textarea>
                                    <button class="inline-flex items-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-lg hover:bg-black transition self-end" onclick="submitHomeAIQuestion()">
                                        <i class="fas fa-paper-plane"></i> 提问
                                    </button>
                                </div>
                            </div>
                            <div class="flex gap-3 pt-4">
                                ${job.source_url ? `
                                <button onclick="window.open('${job.source_url}', '_blank')" class="flex-1 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg text-center hover:bg-gray-200">
                                    <i class="fas fa-globe mr-2"></i>查看原网页
                                </button>
                                ` : ''}
                                ${job.apply_url ? `
                                <button onclick="window.open('${job.apply_url}', '_blank')" class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg text-center hover:bg-blue-700">
                                    <i class="fas fa-external-link-alt mr-2"></i>申请岗位
                                </button>
                                ` : ''}
                            </div>
                        </div>
                    `;

                    document.getElementById('job-modal').classList.remove('hidden');
                }
            } catch (error) {
                console.error('加载岗位详情失败:', error);
                const errorMsg = error.message || '未知错误';
                alert(`加载岗位详情失败: ${errorMsg}`);
            }
        }

        /**
         * 关闭岗位详情弹窗
         */
        function closeJobModal() {
            document.getElementById('job-modal').classList.add('hidden');
        }

        async function requestHomeJobAIAnalysis(question = '') {
            if (!currentJobId) return;
            const output = document.getElementById('home-ai-analysis-result');
            if (output) renderMarkdownOutput(output, 'AI 正在分析当前岗位，请稍候...');

            try {
                const response = await API.analyzeJob(currentJobId, {
                    question,
                    history: aiHistory
                });
                if (question) {
                    aiHistory.push({ role: 'user', content: question });
                }
                aiHistory.push({ role: 'assistant', content: response.answer || '' });
                if (output) renderMarkdownOutput(output, response.answer || 'AI 暂未返回结果');
            } catch (error) {
                if (output) renderMarkdownOutput(output, `AI 分析失败：${error.message}`);
            }
        }

        function renderMarkdownOutput(element, markdownText) {
            if (!element) return;
            const text = String(markdownText || '').trim();
            if (!text) {
                element.innerHTML = '';
                return;
            }
            if (window.marked && window.DOMPurify) {
                const html = marked.parse(text, { breaks: true, gfm: true });
                element.innerHTML = DOMPurify.sanitize(html, { USE_PROFILES: { html: true } });
                element.classList.remove('whitespace-pre-line');
                return;
            }
            element.textContent = text;
            element.classList.add('whitespace-pre-line');
        }

        function submitHomeAIQuestion() {
            const input = document.getElementById('home-ai-question-input');
            const question = input?.value.trim();
            if (!question) return;
            requestHomeJobAIAnalysis(question);
            input.value = '';
        }

        // 点击弹窗外部关闭
        document.getElementById('job-modal')?.addEventListener('click', function(e) {
            if (e.target === this) {
                closeJobModal();
            }
        });
    </script>
