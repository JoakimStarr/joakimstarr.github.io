<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - FinIntern Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="./css/common.css">
</head>
<body class="min-h-screen bg-slate-100">
    <main class="min-h-screen flex items-center justify-center px-6 py-10">
        <div class="w-full max-w-5xl grid lg:grid-cols-[1.1fr_0.9fr] gap-8 items-stretch">
            <section class="rounded-[2rem] bg-slate-900 text-white p-10 shadow-2xl shadow-slate-900/20">
                <div class="inline-flex items-center gap-3 rounded-2xl bg-white/10 px-4 py-3">
                    <div class="w-11 h-11 rounded-2xl bg-blue-500/90 flex items-center justify-center">
                        <i class="fas fa-briefcase text-lg"></i>
                    </div>
                    <div>
                        <div class="text-lg font-semibold">FinIntern Hub</div>
                        <div class="text-sm text-slate-300">金融求职工作台</div>
                    </div>
                </div>
                <h1 class="mt-8 text-4xl font-bold tracking-tight leading-tight">统一账号登录与权限体系</h1>
                <p class="mt-5 text-slate-300 leading-8 text-base">
                    现在可以通过统一账号进入岗位列表、智能推荐、数据采集与系统状态，并按用户角色控制可见页面和管理权限。
                </p>
                <div class="mt-10 grid sm:grid-cols-2 gap-4">
                    <div class="rounded-3xl border border-white/10 bg-white/5 p-5">
                        <div class="text-sm text-slate-400">默认管理员</div>
                        <div class="mt-2 font-semibold text-white">admin</div>
                        <div class="mt-1 text-sm text-slate-300">首次登录后请立即修改密码</div>
                    </div>
                    <div class="rounded-3xl border border-white/10 bg-white/5 p-5">
                        <div class="text-sm text-slate-400">权限模型</div>
                        <div class="mt-2 font-semibold text-white">admin / operator / viewer</div>
                        <div class="mt-1 text-sm text-slate-300">支持用户管理、采集管理、只读访问</div>
                    </div>
                </div>
            </section>

            <section class="rounded-[2rem] bg-white p-8 shadow-xl shadow-slate-200/70 border border-white/80">
                <div class="flex items-center justify-between gap-4">
                    <div>
                        <h2 class="text-2xl font-bold text-slate-900">账号登录</h2>
                        <p class="mt-2 text-sm text-slate-500">登录后可进入完整平台并按权限访问对应模块。</p>
                    </div>
                    <span class="inline-flex items-center rounded-full bg-slate-100 text-slate-700 px-3 py-1 text-sm font-semibold">v3.9.0</span>
                </div>

                <form id="login-form" class="mt-8 space-y-5">
                    <div>
                        <label class="form-label">用户名</label>
                        <input id="username" type="text" class="form-input" placeholder="请输入用户名" required>
                    </div>
                    <div>
                        <label class="form-label">密码</label>
                        <input id="password" type="password" class="form-input" placeholder="请输入密码" required>
                    </div>
                    <div id="login-message" class="hidden rounded-2xl px-4 py-3 text-sm"></div>
                    <button type="submit" id="login-submit" class="btn btn-primary w-full justify-center py-3 text-base">
                        <i class="fas fa-right-to-bracket"></i>
                        登录并进入平台
                    </button>
                </form>

                <div class="mt-8 rounded-3xl bg-slate-50 border border-slate-200 p-5">
                    <div class="text-sm font-semibold text-slate-700">登录说明</div>
                    <ul class="mt-3 space-y-2 text-sm text-slate-500 leading-7">
                        <li>默认管理员账号会在首次启动时自动创建。</li>
                        <li>管理员可在“用户管理”页面新增账号、分配角色、重置密码。</li>
                        <li>未登录或权限不足时，页面会自动跳回登录页。</li>
                    </ul>
                </div>
            </section>
        </div>
    </main>

    <!-- 元数据（优先加载） -->
    <script src="./data/jobs.meta.js"></script>
    <!-- 优先加载前20条数据（约100KB，快速渲染） -->
    <script src="./data/jobs.chunk.0.js"></script>
    <script src="./js/api.js?v=20260405-v391"></script>
    <script src="./js/auth.js?v=20260405-v391"></script>
    <script>
        const form = document.getElementById('login-form');
        const messageBox = document.getElementById('login-message');
        const submitBtn = document.getElementById('login-submit');
    const redirectTarget = getSafeRedirectTarget();

        const loadingScripts = new Map();
    const LOGIN_AUTH_TOKEN_KEY = 'finintern_auth_token';
    const LOGIN_AUTH_USER_KEY = 'finintern_auth_user';
        const USERS_KEY = 'jobweb_users_v1';
    const LEGACY_STATIC_SALT = 'FinInternHub2024@SecureSalt#';

        const ROLE_PERMISSIONS = {
            admin: ['view_jobs', 'view_stats', 'use_recommendations', 'manage_crawler', 'view_system', 'manage_users'],
            operator: ['view_jobs', 'view_stats', 'use_recommendations', 'manage_crawler', 'view_system'],
            viewer: ['view_jobs', 'view_stats', 'use_recommendations']
        };

    const LOGIN_DEFAULT_USERS = [
            { id: 1, username: 'admin', password: 'Admin@123456', display_name: '系统管理员', role: 'admin', is_active: true, last_login_at: '' },
            { id: 2, username: 'operator', password: 'Operator@123', display_name: '采集运营', role: 'operator', is_active: true, last_login_at: '' },
            { id: 3, username: 'viewer', password: 'Viewer@123', display_name: '普通访客', role: 'viewer', is_active: true, last_login_at: '' }
        ];

        function showMessage(message, type = 'info') {
            messageBox.className = `rounded-2xl px-4 py-3 text-sm ${type === 'error' ? 'bg-rose-50 text-rose-700 border border-rose-200' : 'bg-emerald-50 text-emerald-700 border border-emerald-200'}`;
            messageBox.textContent = message;
            messageBox.classList.remove('hidden');
        }

        function getSafeRedirectTarget() {
            const raw = new URLSearchParams(window.location.search).get('redirect');
            if (!raw) return './index.html';

            try {
                const decoded = decodeURIComponent(raw);
                const url = new URL(decoded, window.location.href);
                const path = (url.pathname || '').toLowerCase();

                if (!/^https?:$/i.test(url.protocol)) return './index.html';
                if (path.endsWith('/login.html') || path.endsWith('login.html')) return './index.html';
                if (url.origin !== window.location.origin) return './index.html';

                return `${url.pathname}${url.search}${url.hash}` || './index.html';
            } catch (_) {
                return './index.html';
            }
        }

        function navigateAfterLogin() {
            const target = redirectTarget || './index.html';
            try {
                if (window.location.protocol === 'file:') {
                    window.location.href = './index.html';
                    return;
                }
                window.location.assign(target);
            } catch (_) {
                window.location.href = './index.html';
            }
        }

        function deepClone(value) {
            return JSON.parse(JSON.stringify(value));
        }

        function readStore(key, fallback) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return deepClone(fallback);
                return JSON.parse(raw);
            } catch (_) {
                return deepClone(fallback);
            }
        }

        function writeStore(key, value) {
            localStorage.setItem(key, JSON.stringify(value));
        }

        function ensureLocalUsers() {
            const users = readStore(USERS_KEY, []);
            if (Array.isArray(users) && users.length > 0) return users;
            writeStore(USERS_KEY, LOGIN_DEFAULT_USERS);
            return deepClone(LOGIN_DEFAULT_USERS);
        }

        function buildPublicUser(user) {
            const role = user.role || 'viewer';
            return {
                id: user.id,
                username: user.username,
                display_name: user.display_name || user.username,
                role,
                permissions: (ROLE_PERMISSIONS[role] || ROLE_PERMISSIONS.viewer).slice(),
                is_active: user.is_active !== false,
                last_login_at: user.last_login_at || ''
            };
        }

        function readCachedUser() {
            try {
                return JSON.parse(localStorage.getItem(LOGIN_AUTH_USER_KEY) || 'null');
            } catch (_) {
                return null;
            }
        }

        function setSession(token, user) {
            if (window.AppAuth && typeof window.AppAuth.setSession === 'function') {
                window.AppAuth.setSession(token, user);
                return;
            }
            localStorage.setItem(LOGIN_AUTH_TOKEN_KEY, token || '');
            localStorage.setItem(LOGIN_AUTH_USER_KEY, JSON.stringify(user || {}));
        }

        async function sha256Hex(text) {
            const encoder = new TextEncoder();
            const data = encoder.encode(text);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            return Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function randomSalt(length = 16) {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
            let salt = '';
            for (let i = 0; i < length; i += 1) {
                salt += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return salt;
        }

        async function encryptPassword(password) {
            const salt = randomSalt();
            const hash = await sha256Hex(`${String(password || '')}${salt}`);
            return `${salt}:${hash}`;
        }

        async function verifyPassword(input, stored) {
            const rawInput = String(input || '');
            const rawStored = String(stored || '');
            if (!rawStored) return false;
            if (!rawStored.includes(':')) {
                if (/^[a-f0-9]{64}$/i.test(rawStored)) {
                    const legacyHash = await sha256Hex(`${rawInput}${LEGACY_STATIC_SALT}`);
                    const plainHash = await sha256Hex(rawInput);
                    return rawStored === legacyHash || rawStored === plainHash;
                }
                return rawInput === rawStored;
            }
            const [salt, hash] = rawStored.split(':');
            if (!salt || !hash) return false;
            const computed = await sha256Hex(`${rawInput}${salt}`);
            return computed === hash;
        }

        async function localLogin(credentials) {
            const users = ensureLocalUsers();
            const username = String(credentials.username || '').trim();
            const password = String(credentials.password || '');
            const user = users.find(item => item.username === username);
            if (!user) throw new Error('用户名或密码错误');
            if (user.is_active === false) throw new Error('账号已停用，请联系管理员');
            const valid = await verifyPassword(password, user.password);
            if (!valid) throw new Error('用户名或密码错误');

            if (!String(user.password || '').includes(':')) {
                user.password = await encryptPassword(password);
            }

            user.last_login_at = new Date().toLocaleString('zh-CN', { hour12: false });
            writeStore(USERS_KEY, users);

            return {
                access_token: `jobweb-local-${user.id}-${Date.now()}`,
                user: buildPublicUser(user)
            };
        }

        function loadScriptOnce(src) {
            if (loadingScripts.has(src)) {
                return loadingScripts.get(src);
            }

            const task = new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = src;
                script.async = true;
                script.onload = () => resolve(true);
                script.onerror = () => reject(new Error(`脚本加载失败: ${src}`));
                document.head.appendChild(script);
            });

            loadingScripts.set(src, task);
            return task;
        }

        async function ensureScriptGlobal(globalName, src) {
            if (typeof window[globalName] !== 'undefined') {
                return true;
            }

            const retrySrc = `${src}${src.includes('?') ? '&' : '?'}retry=${Date.now()}`;
            await loadScriptOnce(retrySrc);

            if (typeof window[globalName] === 'undefined') {
                throw new Error(`${globalName} 加载后仍未定义`);
            }

            return true;
        }

        async function ensureRuntimeReady() {
            try {
                await ensureScriptGlobal('API', './js/api.js');
            } catch (_) {}
            try {
                await ensureScriptGlobal('AppAuth', './js/auth.js');
            } catch (_) {}
        }

        (async () => {
            try {
                await ensureRuntimeReady();
                const token = localStorage.getItem(LOGIN_AUTH_TOKEN_KEY) || '';
                const user = (window.AppAuth && typeof window.AppAuth.getCachedUser === 'function') ? window.AppAuth.getCachedUser() : readCachedUser();
                if (token && user && user.id) {
                    navigateAfterLogin();
                }
            } catch (error) {
                console.warn('登录环境初始化异常，已降级为本地登录模式', error);
            }
        })();

        form.addEventListener('submit', async (event) => {
            event.preventDefault();
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 正在登录...';
            try {
                await ensureRuntimeReady();

                const credentials = {
                    username: document.getElementById('username').value.trim(),
                    password: document.getElementById('password').value,
                };

                let payload = null;
                if (window.API && typeof window.API.login === 'function') {
                    try {
                        payload = await window.API.login(credentials);
                    } catch (error) {
                        const message = String(error?.message || '');
                        const canFallback = error?.status === 501
                            || error?.status === 401
                            || /API|脚本|加载|未定义|unsupported|request|用户名或密码错误/i.test(message);
                        if (!canFallback) throw error;
                        payload = await localLogin(credentials);
                    }
                } else {
                    payload = await localLogin(credentials);
                }

                setSession(payload.access_token, payload.user);
                showMessage('登录成功，正在跳转...', 'success');
                setTimeout(() => {
                    navigateAfterLogin();
                }, 400);
            } catch (error) {
                const message = String(error?.message || '').trim();
                const friendlyMessage = /用户名|密码|停用/.test(message)
                    ? message
                    : '登录失败，请检查用户名和密码后重试';
                showMessage(friendlyMessage, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-right-to-bracket"></i> 登录并进入平台';
            }
        });
    </script>
</body>
</html>
